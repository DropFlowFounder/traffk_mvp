version: '3.8'

services:
  db:
    image: postgres:14-alpine
    container_name: traffk_db
    environment:
      POSTGRES_USER: traffk_user
      POSTGRES_PASSWORD: traffk_password
      POSTGRES_DB: traffk_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U traffk_user"]
      interval: 10s
      timeout: 5s
      retries: 5

  bot:
    build: .
    container_name: traffk_bot
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://traffk_user:traffk_password@db:5432/traffk_db
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./logs:/app/logs
    restart: unless-stopped

volumes:
  postgres_data:
